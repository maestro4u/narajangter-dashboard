name: Deploy static dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Write version file (배포마다 커밋 SHA 기록 → 클라이언트 새버전 감지용)
        run: echo "{\"v\":\"${{ github.sha }}\"}" > static/version.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: static
      - id: deployment
        uses: actions/deploy-pages@v4
